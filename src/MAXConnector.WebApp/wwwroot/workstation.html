<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>MAX Workstation</title>
    <link rel="stylesheet" href="/css/app.css" />
    <link rel="stylesheet" href="/css/workstation.css" />
</head>
<body>

    <!-- ── Header ─────────────────────────────────────────────────────── -->
    <header class="app-header">
        <h1 id="headerTitle">MAX Shop Floor</h1>
        <div class="header-right" style="display:flex;align-items:center;gap:8px;">
            <span id="employeeBadge" class="badge" style="display:none;"></span>
            <button id="btnSignOut" class="header-btn" onclick="signOut()"
                    style="display:none;" title="Sign Out">&#x2715;</button>
        </div>
    </header>

    <!-- ── Screen: Employee Sign-In ──────────────────────────────────── -->
    <div id="screenEmployee" class="screen active">
        <div class="ws-center">
            <div class="ws-hero-card">
                <div class="ws-hero-icon">&#128100;</div>
                <h2>Employee Sign In</h2>
                <p class="ws-hint">Scan your badge or enter your Employee ID</p>
                <input type="text" id="inputEmpId" inputmode="numeric"
                       placeholder="Employee ID" autocomplete="off"
                       class="ws-scan-input" autofocus />
                <button class="btn btn-primary btn-xl" onclick="signIn()">Sign In</button>
            </div>
        </div>
    </div>

    <!-- ── Screen: Dashboard ─────────────────────────────────────────── -->
    <div id="screenDashboard" class="screen">

        <!-- Active clock banner (shown when clocked in) -->
        <div id="activeClockBanner" style="display:none;" class="ws-active-banner">
            <div class="ws-banner-label">&#9679; CLOCKED IN</div>
            <div class="ws-banner-order" id="bannerOrder">—</div>
            <div class="ws-banner-part"  id="bannerPart">—</div>
            <div class="ws-banner-timer" id="bannerTimer">0:00:00</div>
            <div class="ws-banner-actions">
                <button class="btn btn-secondary ws-btn-lg"
                        onclick="showSessionModal(false)">Log Out</button>
                <button class="btn btn-danger ws-btn-lg"
                        onclick="showSessionModal(true)">Complete &amp; Post</button>
            </div>
        </div>

        <!-- Idle banner (shown when not clocked in) -->
        <div id="idleBanner" class="ws-idle-banner">
            <div class="ws-idle-icon">&#128203;</div>
            <div>No active job &mdash; scan a work order to begin</div>
            <div style="margin-top:16px;">
                <a href="/materialhandler.html"
                   style="font-size:.85rem;color:rgba(255,255,255,.7);text-decoration:underline;">
                    &#128230; Material Handler &rarr;
                </a>
            </div>
        </div>

        <!-- Order scan input -->
        <div class="ws-scan-row">
            <label class="ws-scan-label">SCAN WORK ORDER</label>
            <input type="text" id="inputOrderScan" inputmode="numeric"
                   placeholder="Work order number&hellip;" autocomplete="off"
                   class="ws-scan-input" />
        </div>

    </div>

    <!-- ── Screen: Order / Operation Select ──────────────────────────── -->
    <div id="screenOrder" class="screen">
        <div id="wsOrderInfo" class="ws-order-banner"></div>
        <p class="ws-section-label">SELECT OPERATION TO CLOCK IN</p>
        <div id="wsOpList" class="list"></div>
        <div style="height:100px;"></div>
    </div>

    <!-- ── Modal: Clock Out ──────────────────────────────────────────── -->
    <div id="modalClockOut" class="modal" style="display:none;">
        <div class="modal-content">
            <h2 id="coTitle">Log Out</h2>

            <div class="ws-co-summary" id="coSummary"></div>

            <!-- Completion fields (shown for Complete &amp; Post only) -->
            <div id="coForm">
                <div class="form-group">
                    <label for="inputCoQty">Pieces Completed</label>
                    <input type="number" id="inputCoQty" inputmode="decimal"
                           min="0" step="1" placeholder="0" />
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="inputCoScrap">Scrap Qty</label>
                        <input type="number" id="inputCoScrap" inputmode="decimal"
                               min="0" step="1" placeholder="0" />
                    </div>
                    <div class="form-group">
                        <label for="inputCoSetup">Setup Time (hrs)</label>
                        <input type="number" id="inputCoSetup" inputmode="decimal"
                               min="0" step="0.25" placeholder="0" />
                    </div>
                </div>
            </div>

            <div class="modal-actions" id="coActions"></div>
        </div>
    </div>

    <!-- ── Toast ─────────────────────────────────────────────────────── -->
    <div id="toast" class="toast"></div>

    <!-- ── Loading overlay ───────────────────────────────────────────── -->
    <div id="loading" class="loading" style="display:none;">
        <div class="spinner"></div>
    </div>

    <script src="/js/workstation.js"></script>
</body>
</html>
